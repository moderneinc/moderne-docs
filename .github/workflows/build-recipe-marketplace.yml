# Build the recipe marketplace CSV (static/recipes-v5.csv) by installing every
# OpenRewrite recipe module with the latest Moderne CLI. All logic lives in
# scripts/build-recipe-marketplace.sh so it can also be run locally.
name: Build recipe marketplace

on:
  workflow_dispatch:
  schedule:
    - cron: 0 3 * * 4 # Weekly on Thursday (after the usual Wednesday release), to pick up new CLI releases
  push:
    branches: [main]
    paths:
      # Rebuild whenever the module list or the build logic changes.
      - docs/user-documentation/recipes/lists/latest-versions-of-every-openrewrite-module.md
      - scripts/build-recipe-marketplace.sh
      - .github/workflows/build-recipe-marketplace.yml

concurrency:
  group: build-recipe-marketplace
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build recipe marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Toolchains needed by the CLI (Java runs the CLI itself; pip/npm/go back
      # the non-jar recipe ecosystems). Versions mirror update-docs.yml.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build marketplace CSV
        env:
          # Isolate CLI state to the runner temp dir.
          MODERNE_CLI_HOME: ${{ runner.temp }}/moderne-cli-home
        run: scripts/build-recipe-marketplace.sh

      - name: Commit and push
        # Push back to the ref the workflow ran on: main for the scheduled/push
        # runs, or the selected branch for a manual workflow_dispatch.
        run: |
          git config user.email "team@moderne.io"
          git config user.name "team-moderne[bot]"
          git add static/recipes-v5.csv
          git diff --cached --quiet || (git commit -m "[Auto] Update recipe marketplace CSV as of $(date +'%Y-%m-%dT%H%M')" && git push origin "HEAD:${{ github.ref_name }}")
