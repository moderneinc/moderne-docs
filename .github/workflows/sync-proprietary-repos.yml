name: Sync Proprietary Repo List

on:
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-repo-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          # Only sees explicitly added repositories: https://github.com/organizations/moderneinc/settings/installations/88151565
          app-id: ${{ secrets.PROPRIETARY_RELEASE_NOTES_APP_ID }}
          private-key: ${{ secrets.PROPRIETARY_RELEASE_NOTES_PRIVATE_KEY }}
          owner: moderneinc

      - name: Sync proprietary repo list
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_ORG: moderneinc
        run: .github/scripts/sync-proprietary-repos.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7.0.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync proprietary repo list"
          title: "chore: Sync proprietary repo list"
          body: |
            Automated sync of the proprietary repository list in the release notes workflow.

            This PR was generated by the weekly sync workflow.
          branch: sync-proprietary-repo-list
          delete-branch: true
