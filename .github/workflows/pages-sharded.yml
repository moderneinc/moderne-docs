# Sharded production deploy: splits SSG across N parallel jobs, then merges
# the per-shard build outputs and deploys to GitHub Pages. Replaces the
# single-job pages.yml (kept as a workflow_dispatch-only emergency fallback).
name: Deploy Moderne docs to Pages (sharded)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update docs"]
    types:
      - completed
  push:
    branches:
      - main

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  SHARD_TOTAL: 8

jobs:
  lint:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Lint markdown
        run: yarn lint:markdown

  build-shard:
    name: Build shard ${{ matrix.shard }}/${{ vars.SHARD_TOTAL || 8 }}
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache bundler artifacts (per shard)
        uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: docusaurus-shard-${{ matrix.shard }}-${{ runner.os }}-${{ hashFiles('yarn.lock', 'docusaurus.config.ts', 'src/theme/**') }}
          restore-keys: |
            docusaurus-shard-${{ matrix.shard }}-${{ runner.os }}-
            docusaurus-${{ runner.os }}-

      - name: Build shard
        run: |
          set -o pipefail
          yarn build:shard 2>&1 | { grep --line-buffered -v "^Generated markdown file:" || true; }
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 8
          DOCUSAURUS_SSG_WORKER_THREAD_RECYCLER_MAX_MEMORY: "512000000"
          DOCUSAURUS_SSR_CONCURRENCY: "16"
          NODE_OPTIONS: "--max-old-space-size=4096 --max-semi-space-size=64"
          DOCUSAURUS_IGNORE_SSG_WARNINGS: true

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-shard-${{ matrix.shard }}
          path: build-shards/shard-${{ matrix.shard }}
          retention-days: 1
          if-no-files-found: error

  combine:
    name: Combine shards
    needs: build-shard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: build-shards
          pattern: build-shard-*

      - name: Normalize artifact layout
        # download-artifact extracts each artifact into its own subdirectory
        # named after the artifact (build-shard-0, build-shard-1, ...). The
        # merge script expects directories named shard-N.
        run: |
          cd build-shards
          for dir in build-shard-*; do
            mv "$dir" "shard-${dir#build-shard-}"
          done
          ls -la

      - name: Install dependencies (for broken-links aggregator)
        run: yarn install --frozen-lockfile

      - name: Merge shards
        run: node scripts/merge-shards.js

      - name: Aggregate broken-links report
        run: |
          node scripts/broken-links-report.js \
            build-shards/shard-*/_shard-meta.json \
            --out broken-links-summary.md

      - name: Append report to job summary
        run: cat broken-links-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload broken-links summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: broken-links-summary
          path: |
            broken-links-summary.md
            broken-links-summary.md.json
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: combine
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
