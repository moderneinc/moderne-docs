# Production deploy: Docusaurus builds the curated docs, a separate streaming
# script renders the recipe catalog, both outputs are merged, and the combined
# artifact is published to GitHub Pages. Replaces the previous 4-shard
# pages-sharded build (deleted), which was OOMing on ubuntu-latest at scale.
name: Deploy Moderne docs to Pages (sharded)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update docs"]
    types:
      - completed
  push:
    branches:
      - main

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Docusaurus docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate recipe-catalog sidebar manifest
        run: yarn build:recipes-sidebar

      - name: Build Docusaurus
        run: yarn build:docs

      - name: Upload Docusaurus artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-docs
          path: build
          retention-days: 1
          if-no-files-found: error

  build-recipes:
    name: Build recipe catalog
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build recipe catalog (streaming render)
        run: yarn build:recipes
        env:
          RECIPE_OUT_DIR: ${{ github.workspace }}/build-recipes/user-documentation/recipes/recipe-catalog

      - name: Upload recipes artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-recipes
          path: build-recipes
          retention-days: 1
          if-no-files-found: error

  combine:
    name: Combine and upload Pages artifact
    needs: [build-docs, build-recipes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Download Docusaurus artifact
        uses: actions/download-artifact@v4
        with:
          name: build-docs
          path: build

      - name: Download recipes artifact
        uses: actions/download-artifact@v4
        with:
          name: build-recipes
          path: build-recipes

      - name: Merge recipe output into docs build
        run: |
          # The recipe build writes under build-recipes/user-documentation/recipes/recipe-catalog/
          # which mirrors the final URL layout. cp -a preserves the tree.
          if [ -d build-recipes/user-documentation ]; then
            cp -a build-recipes/user-documentation build/
          fi
          echo "Merged build tree:"
          find build/user-documentation/recipes/recipe-catalog -maxdepth 2 -type d | head -20
          echo "Total HTML files in build/:"
          find build -name "index.html" | wc -l

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: combine
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
