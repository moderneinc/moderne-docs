name: PR validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-validation-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check file types
        run: node scripts/check-file-types.js
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}

      - name: Validate CSS variables
        run: yarn validate:css

      - name: TypeScript type check
        run: yarn typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache build compilation artifacts
        uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: docusaurus-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            docusaurus-${{ runner.os }}-

      - name: Build site
        run: |
          set -o pipefail
          yarn build 2>&1 | { grep --line-buffered -v "^Generated markdown file:" || true; }
        env:
          DOCUSAURUS_SSG_WORKER_THREAD_COUNT: "2"
          DOCUSAURUS_SSG_WORKER_THREAD_RECYCLER_MAX_MEMORY: "512000000"
          DOCUSAURUS_SSR_CONCURRENCY: "16"
          NODE_OPTIONS: "--max-old-space-size=1536 --max-semi-space-size=64"
          DOCUSAURUS_PERF_LOGGER: "true"
          DOCUSAURUS_IGNORE_SSG_WARNINGS: true
