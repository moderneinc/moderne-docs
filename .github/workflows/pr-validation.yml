name: PR validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-validation-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: worker-large-ssd
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check file types
        run: node scripts/check-file-types.js
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}

      - name: Validate CSS variables
        run: yarn validate:css

      - name: TypeScript type check
        run: yarn typecheck

  build:
    name: Build
    runs-on: worker-large-ssd
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build site
        run: |
          set -o pipefail
          yarn build 2>&1 | { grep --line-buffered -v "^Generated markdown file:" || true; }
        env:
          DOCUSAURUS_IGNORE_SSG_WARNINGS: true
