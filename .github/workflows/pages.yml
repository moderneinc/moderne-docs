# Simple workflow for deploying static content to GitHub Pages
name: Deploy Moderne docs to Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update docs"]
    types:
      - completed
  push:
    branches:
      - main

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache build compilation artifacts
        uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: docusaurus-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            docusaurus-${{ runner.os }}-

      - name: Build website
        run: |
          set +e
          set -o pipefail
          start=$(date +%s)
          yarn build 2>&1 | { grep --line-buffered -v "^Generated markdown file:" || true; }
          BUILD_RC=${PIPESTATUS[0]}
          elapsed=$(( $(date +%s) - start ))

          cgroup_path=$(awk -F: '$1 == "0" {print $3}' /proc/self/cgroup 2>/dev/null || true)
          peak_file="/sys/fs/cgroup${cgroup_path}/memory.peak"
          [[ -r "$peak_file" ]] || peak_file=/sys/fs/cgroup/memory.peak

          {
            echo '## Build memory profile'
            echo ""
            printf 'Elapsed: **%dm %02ds**\n\n' $((elapsed/60)) $((elapsed%60))
            if [[ -r "$peak_file" ]]; then
              peak_bytes=$(cat "$peak_file")
              peak_mb=$((peak_bytes / 1024 / 1024))
              echo "Peak cgroup memory: **${peak_mb} MB** (${peak_bytes} bytes)"
              echo ""
              echo "Source: \`$peak_file\`"
            else
              echo '(cgroup memory.peak not available)'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$BUILD_RC"
        env:
          DOCUSAURUS_IGNORE_SSG_WARNINGS: true

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
