# Emergency fallback: single-job deploy. Superseded by pages-sharded.yml as
# the primary deploy path; kept here as a manually-dispatched backup in case
# the sharded build needs to be bypassed.
name: Deploy Moderne docs to Pages (emergency fallback)

on:
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache build compilation artifacts
        uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: docusaurus-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            docusaurus-${{ runner.os }}-

      - name: Build website
        run: |
          set -o pipefail
          yarn build 2>&1 | { grep --line-buffered -v "^Generated markdown file:" || true; }
        env:
          DOCUSAURUS_SSG_WORKER_THREAD_RECYCLER_MAX_MEMORY: "512000000"
          DOCUSAURUS_SSR_CONCURRENCY: "16"
          NODE_OPTIONS: "--max-old-space-size=1536 --max-semi-space-size=64"
          DOCUSAURUS_IGNORE_SSG_WARNINGS: true

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
